<nav class="navbar navbar-dark bg-dark px-3">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">

  <a class="navbar-brand ai-brand">AI Research Assistant</a>

  <div class="d-flex gap-3 align-items-center">

    <ng-container *ngIf="isLoggedIn">
      <a class="nav-option text-decoration-none" routerLink="/">Dashboard</a>
      <a class="nav-option text-decoration-none" routerLink="/upload">Upload</a>
      <a class="nav-option text-decoration-none" routerLink="/summary">Summary</a>
      <a class="nav-option text-decoration-none" routerLink="/questions">Questions</a>
      <a class="nav-option text-decoration-none" routerLink="/ask-ai">Ask AI</a>
      <a class="nav-option text-decoration-none" routerLink="/flowchart">Flowchart</a>

      <!-- 👤 USER + LOGOUT -->
      <span class="text-light" style="font-size: 13px; opacity: 0.7;">
        👤 {{ userName }}
      </span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </ng-container>

    <ng-container *ngIf="!isLoggedIn">
      <a class="nav-option text-decoration-none" routerLink="/login">Login</a>
      <a class="nav-option text-decoration-none" routerLink="/register">Register</a>
    </ng-container>

  </div>
</nav>

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
